<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1a1614" />
<title>The Met · 导览 Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f0e8;
    --bg-warm: #ebe4d6;
    --ink: #1a1614;
    --ink-soft: #5a5550;
    --ink-faint: #9a948b;
    --line: #d4ccbc;
    --line-faint: #e4ddcd;
    --accent: #a83a25;
    --accent-soft: #c95a3f;
    --gold: #b08b50;
    --paper: #faf6ec;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; }

  /* ─── Header ─── */
  header {
    flex-shrink: 0;
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    position: relative;
    z-index: 10;
  }
  .brand {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px;
  }
  .brand-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .brand-title em {
    font-style: italic;
    color: var(--accent);
  }
  .brand-sub {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    font-weight: 400;
  }
  .location-pill {
    margin-top: 10px;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px;
    color: var(--ink-soft);
    padding: 4px 10px;
    background: var(--bg-warm);
    border-radius: 100px;
    border: 1px solid var(--line);
  }
  .location-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-faint);
  }
  .location-pill.active .dot {
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(168,58,37,0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(168,58,37,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(168,58,37,0); }
    100% { box-shadow: 0 0 0 0 rgba(168,58,37,0); }
  }

  /* ─── Floor switcher ─── */
  .floor-tabs {
    flex-shrink: 0;
    display: flex;
    padding: 8px 12px;
    gap: 6px;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .floor-tabs::-webkit-scrollbar { display: none; }
  .floor-tab {
    flex: 1; min-width: max-content;
    padding: 9px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    color: var(--ink-soft);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .floor-tab .num {
    font-size: 10px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    margin-bottom: 1px;
  }
  .floor-tab.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .floor-tab.active .num {
    color: rgba(255,255,255,0.55);
  }

  /* ─── Map area ─── */
  .map-stage {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }
  .map-stage svg {
    width: 100%; height: 100%;
    display: block;
  }
  .floor-svg { display: none; }
  .floor-svg.active { display: block; }

  /* SVG styling */
  .room {
    fill: var(--paper);
    stroke: var(--line);
    stroke-width: 1.2;
  }
  .room.special {
    fill: #f1e8d4;
  }
  .room-label {
    font-family: 'Inter', sans-serif;
    font-size: 7.5px;
    fill: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 400;
    pointer-events: none;
  }
  .room-label.large {
    font-size: 9px;
    fill: var(--ink-soft);
  }
  .corridor {
    fill: var(--bg-warm);
    stroke: var(--line-faint);
    stroke-width: 0.8;
  }
  .entrance-marker {
    fill: var(--ink);
  }
  .entrance-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    fill: var(--ink);
    font-style: italic;
  }

  /* Route line */
  .route-path {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 5 4;
    animation: dashflow 30s linear infinite;
    filter: drop-shadow(0 1px 2px rgba(168,58,37,0.2));
  }
  @keyframes dashflow {
    to { stroke-dashoffset: -300; }
  }

  /* Exhibit markers */
  .marker {
    cursor: pointer;
  }
  .marker-bg {
    fill: var(--paper);
    stroke: var(--accent);
    stroke-width: 1.5;
    transition: all 0.2s ease;
  }
  .marker-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 9px;
    fill: var(--accent);
    text-anchor: middle;
    dominant-baseline: central;
    font-weight: 600;
    pointer-events: none;
  }
  .marker:hover .marker-bg,
  .marker.focused .marker-bg {
    fill: var(--accent);
  }
  .marker:hover .marker-num,
  .marker.focused .marker-num {
    fill: var(--paper);
  }

  /* User location dot */
  .user-pos {
    pointer-events: none;
  }
  .user-pos-inner {
    fill: #2563eb;
    stroke: white;
    stroke-width: 1.5;
  }
  .user-pos-pulse {
    fill: #2563eb;
    opacity: 0.25;
    animation: userpulse 2s ease-out infinite;
    transform-origin: center;
    transform-box: fill-box;
  }
  @keyframes userpulse {
    0% { transform: scale(0.6); opacity: 0.35; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  /* ─── Legend ─── */
  .legend {
    position: absolute;
    bottom: 14px; left: 14px;
    background: rgba(250, 246, 236, 0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 10px;
    color: var(--ink-soft);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .legend-row { display: flex; align-items: center; gap: 7px; }
  .legend-swatch {
    width: 16px; height: 4px; border-radius: 2px;
  }
  .legend-swatch.route { background: var(--accent); }
  .legend-swatch.dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #2563eb;
    box-shadow: 0 0 0 2px white;
  }
  .legend-num {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    background: var(--paper);
    font-family: 'Cormorant Garamond', serif;
    font-size: 9px;
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
  }

  /* ─── Locate button ─── */
  .locate-btn {
    position: absolute;
    bottom: 14px; right: 14px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    transition: transform 0.2s;
  }
  .locate-btn:active { transform: scale(0.92); }
  .locate-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* ─── Detail sheet (bottom sheet on mobile) ─── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(26, 22, 20, 0);
    pointer-events: none;
    transition: background 0.3s ease;
    z-index: 100;
  }
  .sheet-overlay.open {
    background: rgba(26, 22, 20, 0.4);
    pointer-events: auto;
  }
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--paper);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.15);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 101;
    max-height: 88vh;
    display: flex; flex-direction: column;
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle {
    flex-shrink: 0;
    padding: 8px 0 4px;
    display: flex; justify-content: center;
  }
  .sheet-handle::before {
    content: '';
    width: 36px; height: 4px;
    background: var(--line);
    border-radius: 4px;
  }
  .sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 6px 24px 32px;
    -webkit-overflow-scrolling: touch;
  }
  .sheet-num {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin: 8px 0 6px;
    font-weight: 600;
  }
  .sheet-num::before, .sheet-num::after { content: '—'; opacity: 0.5; margin: 0 4px; }
  .sheet-title-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.005em;
    margin-bottom: 6px;
  }
  .sheet-title-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .sheet-meta {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 10px 0 14px;
    border-top: 1px solid var(--line-faint);
    border-bottom: 1px solid var(--line-faint);
    margin-bottom: 16px;
  }
  .meta-chip {
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--bg-warm);
    padding: 4px 10px;
    border-radius: 100px;
    font-weight: 400;
  }
  .meta-chip strong {
    color: var(--ink);
    font-weight: 500;
    margin-right: 4px;
  }
  .sheet-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    font-weight: 500;
    margin: 16px 0 8px;
  }
  .sheet-text {
    font-family: 'Noto Serif SC', 'Inter', serif;
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--ink);
    font-weight: 300;
  }
  .sheet-text + .sheet-text { margin-top: 10px; }
  .sheet-nav {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--line-faint);
  }
  .sheet-nav-btn {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .sheet-nav-btn.primary {
    background: var(--ink);
    color: var(--paper);
  }
  .sheet-nav-btn:active { transform: scale(0.98); }
  .sheet-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Splash */
  .splash {
    position: fixed; inset: 0;
    background: var(--paper);
    z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
    transition: opacity 0.6s ease 0.3s, visibility 0s linear 0.9s;
  }
  .splash.gone { opacity: 0; visibility: hidden; }
  .splash-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .splash-title em { color: var(--accent); font-style: normal; font-weight: 500; }
  .splash-sub {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
  }
  .splash-line {
    width: 60px; height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    animation: lineGrow 1.2s ease-out forwards;
  }
  @keyframes lineGrow {
    to { transform: scaleX(1); }
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-200%);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 12px;
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 150;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    max-width: 88%;
    text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-sub">The Metropolitan Museum of Art</div>
  <div class="splash-line"></div>
  <div class="splash-title">A Curated <em>Walk</em></div>
  <div class="splash-sub">二十件 · 镇馆之宝</div>
</div>

<header>
  <div class="brand">
    <div>
      <div class="brand-title">The <em>Met</em> · 大都会</div>
      <div class="brand-sub">Twenty Masterpieces · One Route</div>
    </div>
    <div class="location-pill" id="locPill">
      <span class="dot"></span>
      <span id="locText">5th Ave · NYC</span>
    </div>
  </div>
</header>

<div class="floor-tabs" id="floorTabs"></div>

<div class="map-stage" id="mapStage">
  <!-- SVGs injected here -->

  <div class="legend">
    <div class="legend-row"><div class="legend-swatch route"></div><span>建议路线</span></div>
    <div class="legend-row"><div class="legend-num">1</div><span>展品 · tap 查看</span></div>
    <div class="legend-row"><div class="legend-swatch dot"></div><span>你的位置</span></div>
  </div>

  <button class="locate-btn" id="locateBtn" aria-label="定位">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
  </button>
</div>

<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="sheet-handle" id="sheetHandle"></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   EXHIBIT DATA — 20 masterpieces across The Met
   Coordinates are normalized to each floor's SVG viewBox (0-400 x 0-260)
   ═══════════════════════════════════════════════════════════════ */

const EXHIBITS = [
  // ─── FIRST FLOOR ───
  {
    id: 1, floor: 1, x: 168, y: 68, gallery: '131',
    titleEn: 'The Temple of Dendur',
    titleZh: '丹铎神庙',
    artist: 'Roman Period · Egypt', artistZh: '罗马时期 · 古埃及',
    date: 'ca. 15 BC',
    medium: 'Aeolian sandstone · 砂岩',
    bg: '由罗马皇帝奥古斯都于公元前 15 年下令建造，原立于尼罗河畔的努比亚地区，奉献给伊西斯女神和两位淹死在尼罗河中的努比亚酋长之子。1965 年，因阿斯旺大坝工程将淹没该址，埃及将整座神庙拆解为 642 块石材赠予美国，以感谢美方在文物抢救中的贡献。1978 年于大都会重新组装，是美国境内唯一一座完整的古埃及神庙。',
    view: '神庙被安置在一个朝向中央公园的玻璃幕墙大厅中，前方仿造尼罗河岸的水池。早上 10–11 点光线最佳，斜射的自然光会复现尼罗河谷的氛围。注意大门两侧的浮雕：奥古斯都被表现为法老形象，向埃及神祇献祭——这是罗马人统治埃及后的政治姿态。绕到神庙背面，可以看到拿破仑远征军留下的涂鸦签名（"L. Vidal" 等）。'
  },
  {
    id: 2, floor: 1, x: 198, y: 92, gallery: '138',
    titleEn: 'Hatshepsut Statues',
    titleZh: '哈特谢普苏特女王雕像群',
    artist: 'New Kingdom, Dynasty 18', artistZh: '新王国 · 第十八王朝',
    date: 'ca. 1479–1458 BC',
    medium: 'Granite, limestone · 花岗岩、石灰岩',
    bg: '哈特谢普苏特是古埃及最强大的女法老之一，她以男性装束（包括假胡须）登基执政二十余年。其继任者图特摩斯三世在她死后试图抹去她的存在，将她位于代尔巴哈里葬祭殿的雕像砸碎并扔进采石场。20 世纪 20–30 年代大都会博物馆考古队在此发掘，将碎片运回纽约修复，形成了世界上最完整的哈特谢普苏特雕像收藏。',
    view: '注意女王的脸部——尽管被刻意以男性法老形象表现（戴 nemes 头巾、假胡须），但脸型、下颌的柔和线条仍透露出女性特征。看跪坐祭祀像，她以谦卑姿态向神献祭，但比例之恢宏（接近真人两倍）又传达统治者的威严——这种"既谦卑又神圣"是埃及王权艺术的核心矛盾。雕像表面可见后人凿刻的痕迹，是政治抹除的物证。'
  },
  {
    id: 3, floor: 1, x: 232, y: 138, gallery: '154',
    titleEn: 'Marble statue of a kouros (youth)',
    titleZh: '青年立像（库罗斯）',
    artist: 'Greek, Attic', artistZh: '古希腊 · 阿提卡',
    date: 'ca. 590–580 BC',
    medium: 'Naxian marble · 那克索斯大理石',
    bg: '一件墓地标志雕像，立于一位青年墓前，是希腊古风时期（Archaic）最早的大型独立人体雕像之一。其姿态——左脚前迈、双臂垂直、嘴角微扬（古风式微笑）——明显借鉴了古埃及立像的程式，但希腊人开始让石头"呼吸"：肌肉、骨骼的解剖学有了萌芽。这件作品标志着西方裸体雕塑传统的真正起点。',
    view: '从侧面看，注意他僵硬挺立的姿势——和埃及雕像几乎一致。再绕到正面看脸部："古风的微笑"是希腊早期雕塑的标志，那不是真在微笑，而是雕刻家不知如何处理嘴部，便以此程式让脸"有生气"。一百年后，到了古典时期，希腊雕塑将彻底突破这种僵硬（参见后面的展品）。'
  },
  {
    id: 4, floor: 1, x: 262, y: 162, gallery: '162',
    titleEn: 'The Hellenistic Court & The Cubiculum from Boscoreale',
    titleZh: '博斯科雷亚莱卧室壁画',
    artist: 'Roman, Late Republic', artistZh: '古罗马 · 共和末期',
    date: 'ca. 50–40 BC',

/* ═══════════════════════════════════════════════════════════════
   APP STATE & LOGIC
   ═══════════════════════════════════════════════════════════════ */

let state = {
  currentFloor: 1,
  currentExhibit: null,
  userLocation: null,
  geoWatchId: null
};

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

function init() {
  renderFloorTabs();
  renderFloors();
  renderMarkers();
  bindEvents();

  // Hide splash
  setTimeout(() => {
    $('#splash').classList.add('gone');
  }, 1400);
}

function renderFloorTabs() {
  const tabs = $('#floorTabs');
  tabs.innerHTML = FLOORS.map(f => `
    <button class="floor-tab ${f.id === state.currentFloor ? 'active' : ''}" data-floor="${f.id}">
      <span class="num">Level ${f.id}</span>
      ${f.nameZh} · ${f.name}
    </button>
  `).join('');

  tabs.addEventListener('click', (e) => {
    const btn = e.target.closest('.floor-tab');
    if (!btn) return;
    const floor = parseInt(btn.dataset.floor);
    switchFloor(floor);
  });
}

function renderFloors() {
  const stage = $('#mapStage');
  // Insert floor SVGs while preserving legend & locate button
  const existing = stage.querySelectorAll('.floor-svg');
  existing.forEach(e => e.remove());

  FLOORS.forEach(f => {
    const div = document.createElement('div');
    div.className = `floor-svg ${f.id === state.currentFloor ? 'active' : ''}`;
    div.dataset.floor = f.id;
    div.innerHTML = FLOOR_SVGS[f.id];
    div.style.position = 'absolute';
    div.style.inset = '0';
    stage.insertBefore(div, stage.firstChild);
  });
}

function renderMarkers() {
  EXHIBITS.forEach(ex => {
    const container = document.querySelector(`#markers-${ex.floor}`);
    if (!container) return;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'marker');
    g.setAttribute('data-id', ex.id);
    g.setAttribute('transform', `translate(${ex.x}, ${ex.y})`);

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('class', 'marker-bg');
    circle.setAttribute('r', '8');
    g.appendChild(circle);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('class', 'marker-num');
    text.setAttribute('x', '0');
    text.setAttribute('y', '0');
    text.textContent = ex.id;
    g.appendChild(text);

    g.addEventListener('click', () => openExhibit(ex.id));
    container.appendChild(g);
  });
}

function switchFloor(floor) {
  state.currentFloor = floor;
  $$('.floor-tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.floor) === floor);
  });
  $$('.floor-svg').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.floor) === floor);
  });
  updateUserPosition();
}

function openExhibit(id) {
  const ex = EXHIBITS.find(e => e.id === id);
  if (!ex) return;
  state.currentExhibit = id;

  // Switch floor if needed
  if (ex.floor !== state.currentFloor) {
    switchFloor(ex.floor);
  }

  // Highlight marker
  $$('.marker').forEach(m => m.classList.remove('focused'));
  document.querySelector(`.marker[data-id="${id}"]`)?.classList.add('focused');

  // Render sheet content
  const allIds = [...ROUTE[1], ...ROUTE[2]];
  const idx = allIds.indexOf(id);
  const prevId = idx > 0 ? allIds[idx - 1] : null;
  const nextId = idx < allIds.length - 1 ? allIds[idx + 1] : null;

  $('#sheetBody').innerHTML = `
    <div class="sheet-num">No. ${String(ex.id).padStart(2, '0')} / 20</div>
    <h1 class="sheet-title-en">${ex.titleEn}</h1>
    <div class="sheet-title-zh">${ex.titleZh}</div>
    <div class="sheet-meta">
      <span class="meta-chip"><strong>艺术家</strong>${ex.artist}</span>
      <span class="meta-chip"><strong>年代</strong>${ex.date}</span>
      <span class="meta-chip"><strong>展厅</strong>Gallery ${ex.gallery}</span>
      <span class="meta-chip"><strong>媒介</strong>${ex.medium}</span>
    </div>
    <div class="sheet-section-label">背景 · Background</div>
    <p class="sheet-text">${ex.bg}</p>
    <div class="sheet-section-label">欣赏指引 · How to Look</div>
    <p class="sheet-text">${ex.view}</p>
    <div class="sheet-nav">
      <button class="sheet-nav-btn" id="prevBtn" ${!prevId ? 'disabled' : ''}>← 上一件</button>
      <button class="sheet-nav-btn primary" id="nextBtn" ${!nextId ? 'disabled' : ''}>下一件 →</button>
    </div>
  `;

  document.getElementById('prevBtn')?.addEventListener('click', () => prevId && openExhibit(prevId));
  document.getElementById('nextBtn')?.addEventListener('click', () => nextId && openExhibit(nextId));

  $('#sheet').classList.add('open');
  $('#sheetOverlay').classList.add('open');
}

function closeSheet() {
  $('#sheet').classList.remove('open');
  $('#sheetOverlay').classList.remove('open');
  $$('.marker').forEach(m => m.classList.remove('focused'));
  state.currentExhibit = null;
}

function bindEvents() {
  $('#sheetOverlay').addEventListener('click', closeSheet);

  // Sheet drag-to-close on handle
  let startY = 0, currentY = 0, dragging = false;
  const sheet = $('#sheet');
  const onStart = (e) => {
    dragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    sheet.style.transition = 'none';
  };
  const onMove = (e) => {
    if (!dragging) return;
    currentY = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = Math.max(0, currentY - startY);
    sheet.style.transform = `translateY(${dy}px)`;
  };
  const onEnd = () => {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = '';
    const dy = currentY - startY;
    if (dy > 100) {
      closeSheet();
    } else {
      sheet.style.transform = '';
    }
  };
  $('#sheetHandle').addEventListener('touchstart', onStart, { passive: true });
  document.addEventListener('touchmove', onMove, { passive: true });
  document.addEventListener('touchend', onEnd);
  $('#sheetHandle').addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);

  // Locate button
  $('#locateBtn').addEventListener('click', requestLocation);
}

/* ─── Geolocation ─── */

// The Met's approximate bounding box (5th Ave entrance area)
// Real GPS: 40.7794° N, 73.9632° W (5th Ave & 82nd St)
// Building roughly spans 40.7779–40.7799 N, 73.9650–73.9620 W
const MET_BOUNDS = {
  south: 40.7779,
  north: 40.7799,
  west: -73.9650,
  east: -73.9620
};

// Map lat/lng to SVG coords (400 × 260)
// 5th Ave (east edge) = right side of SVG; Central Park (west edge) = left
function geoToSvg(lat, lng) {
  // Normalize 0-1
  const u = (lng - MET_BOUNDS.west) / (MET_BOUNDS.east - MET_BOUNDS.west);
  const v = (MET_BOUNDS.north - lat) / (MET_BOUNDS.north - MET_BOUNDS.south);
  return {
    x: u * 400,
    y: v * 260
  };
}

function requestLocation() {
  showToast('请求定位中...');
  if (!navigator.geolocation) {
    showToast('该设备不支持地理定位');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude, accuracy } = pos.coords;
      state.userLocation = { lat: latitude, lng: longitude, accuracy };

      // Check if inside Met bounds
      const inside = latitude >= MET_BOUNDS.south && latitude <= MET_BOUNDS.north
                  && longitude >= MET_BOUNDS.west && longitude <= MET_BOUNDS.east;

      if (inside) {
        $('#locPill').classList.add('active');
        $('#locText').textContent = `在馆内 · ±${Math.round(accuracy)}m`;
        showToast('已定位到馆内位置（室内 GPS 精度有限）');
      } else {
        $('#locPill').classList.add('active');
        $('#locText').textContent = `馆外 · 已定位`;
        showToast('你目前不在大都会博物馆，已在地图标记估算位置');
      }
      updateUserPosition();
    },
    (err) => {
      let msg = '定位失败';
      if (err.code === 1) msg = '已拒绝定位权限';
      else if (err.code === 2) msg = '位置信号不可用';
      else if (err.code === 3) msg = '定位超时';
      showToast(msg);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
  );
}

function updateUserPosition() {
  // Clear existing
  document.querySelectorAll('[id^="user-"]').forEach(g => g.innerHTML = '');

  if (!state.userLocation) return;

  const { lat, lng } = state.userLocation;
  const { x, y } = geoToSvg(lat, lng);

  // Clamp to SVG bounds
  const cx = Math.max(8, Math.min(392, x));
  const cy = Math.max(8, Math.min(252, y));

  // Add to current floor
  const container = document.querySelector(`#user-${state.currentFloor}`);
  if (!container) return;

  container.innerHTML = `
    <g class="user-pos">
      <circle cx="${cx}" cy="${cy}" r="6" class="user-pos-pulse"/>
      <circle cx="${cx}" cy="${cy}" r="4" class="user-pos-inner"/>
    </g>
  `;
}

function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

document.addEventListener('DOMContentLoaded', init);
